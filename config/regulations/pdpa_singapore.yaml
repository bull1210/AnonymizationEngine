# Singapore PDPA (Personal Data Protection Act 2012, amended 2020).
# The PDPC's Advisory Guidelines on Anonymisation accept pseudonymization as
# an anonymisation technique when the re-identification key is held separately
# and the risk of re-identification is remote — which maps cleanly onto this
# engine's HMAC pseudonyms under a tenant salt. NRIC/FIN gets its own
# treatment: the PDPC's 2018 NRIC advisory prohibits collecting or retaining
# NRIC numbers except where required by law, so it is suppressed outright.
regulation: PDPA_Singapore
version: "2026.07"
description: Singapore PDPA — pseudonymization per PDPC anonymisation guidance; NRIC/FIN suppressed
jurisdiction: Singapore
category: privacy
default_action: suppress
below_threshold: review
rules:
  - { entity: PERSON,         min_confidence: 0.80, action: hmac_tokenize }
  - { entity: EMAIL,          min_confidence: 0.75, action: hmac_tokenize }
  - { entity: PHONE,          min_confidence: 0.75, action: hmac_tokenize }
  - { entity: ADDRESS,        min_confidence: 0.75, action: hmac_tokenize }
  - { entity: LOCATION,       min_confidence: 0.75, action: hmac_tokenize }
  - { entity: IP,             min_confidence: 0.75, action: hmac_tokenize }
  - { entity: URL,            min_confidence: 0.75, action: hash_irreversible }
  # -- NRIC / FIN: PDPC advisory forbids retention absent a legal requirement
  - { entity: SSN,            action: suppress }
  - { entity: PASSPORT,       action: suppress }
  - { entity: AADHAAR,        action: suppress }
  - { entity: PAN,            min_confidence: 0.70, action: hash_irreversible }
  - { entity: CREDIT_CARD,    action: suppress }
  - { entity: ACCOUNT_NUMBER, min_confidence: 0.70, action: hash_irreversible }
  - { entity: MRN,            min_confidence: 0.70, action: hash_irreversible }
  # -- quasi-identifiers
  - { entity: DOB,            min_confidence: 0.70, action: generalize }
  - { entity: DATE,           min_confidence: 0.75, action: date_shift }
  - { entity: ZIP,            min_confidence: 0.70, action: generalize }
  - { entity: PINCODE,        min_confidence: 0.70, action: generalize }
  - { entity: AGE,            min_confidence: 0.70, action: generalize }
  - { entity: MEDICATION,     action: keep }
  - { entity: DIAGNOSIS,      action: keep }
  - { entity: PROCEDURE,      action: keep }
  # -- PDPA covers individuals, not organizations
  - { entity: ORG,            action: keep }
  - { entity: ORGANIZATION,   action: keep }
